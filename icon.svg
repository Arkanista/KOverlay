<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0077ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ffcc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00e5ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Outer ring glow -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="url(#grad1)" stroke-width="3" filter="url(#glow)" opacity="0.3" />
  
  <!-- Background screen (Game) -->
  <rect x="18" y="22" width="55" height="40" rx="4" fill="none" stroke="url(#grad1)" stroke-width="3" opacity="0.6" />
  
  <!-- Foreground screen (Overlay window) -->
  <!-- Dark background to obscure the line behind it -->
  <rect x="38" y="42" width="46" height="38" rx="4" fill="#181818" />
  <rect x="38" y="42" width="46" height="38" rx="4" fill="none" stroke="url(#grad2)" stroke-width="4" filter="url(#glow)" />
  
  <!-- Window title bar -->
  <line x1="38" y1="52" x2="84" y2="52" stroke="url(#grad2)" stroke-width="3" />
  <!-- Three dots -->
  <circle cx="44" cy="47" r="1.5" fill="url(#grad1)" />
  <circle cx="49" cy="47" r="1.5" fill="url(#grad1)" />
  <circle cx="54" cy="47" r="1.5" fill="url(#grad1)" />
  
  <!-- Center sound waves inside overlay -->
  <rect x="48" y="62" width="4" height="10" rx="2" fill="url(#grad1)" />
  <rect x="58" y="56" width="4" height="20" rx="2" fill="url(#grad1)" />
  <rect x="68" y="60" width="4" height="14" rx="2" fill="url(#grad1)" />
</svg>
